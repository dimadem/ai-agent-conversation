<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интервью</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex flex-col justify-center items-center bg-gray-200 min-h-screen font-sans">
    <div class="bg-white shadow mt-6 p-6 rounded w-full max-w-4xl">
        <div id="messages" class="mb-4 p-4 border h-96 overflow-y-auto"></div>
        <form onsubmit="sendMessage(event)" class="flex space-x-2">
            <input type="text" id="messageText" placeholder="Type a message" class="flex-grow p-2 border rounded">
            <button type="submit" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded text-white">
                отправить
            </button>
        </form>
        <div class="flex justify-between space-x-2 mt-4">
            <button class="bg-red-600 text-white">
                Завершить интервью
            </button>
            <!-- 
            todo:
            1. Когда нажимается кнопка закончить интервью
            2. Сохранить интервью в файловую систему
            3. если да, сохраня json в файловую систему
            4. если нет, то просто закрыть окно
            -->
            <span id="recordingStatus" class="text-gray-600"></span>
            <button id="recordButton" onclick="toggleRecording()" class="bg-blue-600 hover:bg-red-600 px-4 py-2 rounded text-white">
                Записать голос
            </button>
        </div>
    </div>
    
    <script>
        const wsText = new WebSocket("ws://localhost:8000/ws/text");
        const wsVoice = new WebSocket("ws://localhost:8000/ws/voice");
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        // Добавление глобальной истории сообщений
        var conversationHistory = { messages: [] };

        // Функция обновления отображения истории сообщений
        function updateChatDisplay() {
            const messagesEl = document.getElementById('messages');
            messagesEl.innerHTML = "";
            conversationHistory.messages.forEach(msg => {
                const div = document.createElement('div');
                if (msg.role === 'user') {
                    div.textContent = '［👤］: ' + msg.text;
                    div.className = 'mb-2 text-right';
                } else if (msg.role === 'assistant') {
                    div.textContent = '［🤖］: ' + msg.text;
                    div.className = 'mb-2 text-left';
                }
                messagesEl.appendChild(div);
            });
            messagesEl.scrollTop = messagesEl.scrollHeight;


            console.log('conversationHistory:', conversationHistory);
        }

        wsText.onmessage = function(event) {
            const response = JSON.parse(event.data);
            // Если предыдущий placeholder "..." существует, заменяем его на настоящий ответ
            if (conversationHistory.messages.length &&
                conversationHistory.messages[conversationHistory.messages.length - 1].role === 'assistant' &&
                conversationHistory.messages[conversationHistory.messages.length - 1].text === '...') {
                conversationHistory.messages[conversationHistory.messages.length - 1].text = response.agent_response_text;
            } else {
                conversationHistory.messages.push({ role: "assistant", text: response.agent_response_text });
            }
            updateChatDisplay();
            document.getElementById("messageText").disabled = false;
            document.getElementById("messageText").focus();
        };

        wsVoice.onmessage = function(event) {
            const response = JSON.parse(event.data);
            addMessageToChat(response.user_input_text, 'user_input_text');
            addMessageToChat(response.agent_response_text, 'agent_response_text');
            const audio = new Audio();
            audio.src = 'data:audio/mp3;base64,' + response.agent_response_audio;
            audio.play().catch(e => console.error('wsVoice:', e));
        };

        function addMessageToChat(text, type) {
            const messages = document.getElementById('messages');
            const message = document.createElement('div');
            if (type === 'user_input_text') {
                message.textContent = '［👤］: ' + text;
                message.className = 'mb-2 text-right';
            } else if (type === 'agent_response_text') {
                message.textContent = '［🤖］: ' + text;
                message.className = 'mb-2 text-left';
            }
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
        }

        function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById("messageText"),
                  userMsg = input.value.trim();
            if (userMsg === "") return;
            // Добавляем сообщение пользователя и placeholder для ответа ассистента
            conversationHistory.messages.push({ role: "user", text: userMsg });
            conversationHistory.messages.push({ role: "assistant", text: "..." });
            updateChatDisplay();
            wsText.send(userMsg);
            input.value = '';
            input.disabled = true;
        }

        async function toggleRecording() {
            const recordButton = document.getElementById('recordButton');
            const statusElement = document.getElementById('recordingStatus');

            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        // Преобразуем в PCM/WAV формат
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            const base64Audio = reader.result.split(',')[1];
                            
                            // Добавляем дополнительный параметр чтобы сервер знал формат
                            const payload = JSON.stringify({
                                audio: base64Audio,
                                format: 'webm'
                            });
                            wsVoice.send(base64Audio);  // оставляем как было для совместимости
                        };
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordButton.textContent = 'Stop';
                    recordButton.classList.add('recording');
                    statusElement.textContent = 'Recording...';
                } catch (err) {
                    console.error('Record:', err);
                    statusElement.textContent = 'Error mic access';
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                recordButton.textContent = 'Record Voice';
                recordButton.classList.remove('recording');
                statusElement.textContent = '';
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
        }
    </script>
</body>
</html>
