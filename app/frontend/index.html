<!DOCTYPE html>
<html>
<head>
    <title>chat</title>
    <style>
        .recording { 
            background-color: #ff0000;
            animation: pulse 1s infinite;
        }
        .message-text { color: #000; }
        .message-voice { color: #0066cc; }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
        .user-message {
            color: #2c3e50;
            margin: 5px;
            padding: 8px;
            background-color: #e8f5e9;
            border-radius: 8px;
        }
        
        .agent-message {
            color: #2c3e50;
            margin: 5px;
            padding: 8px;
            background-color: #e3f2fd;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div id="messages"></div>
        <form onsubmit="sendMessage(event)">
            <input type="text" id="messageText" autocomplete="off"/>
            <button type="submit">Отправить текст</button>
        </form>
        <div class="audio-controls">
            <button id="recordButton" onclick="toggleRecording()">Начать запись</button>
            <span id="recordingStatus"></span>
        </div>
    </div>
    
    <script>
        const wsChat = new WebSocket("ws://localhost:8000/ws/text");
        const wsVoice = new WebSocket("ws://localhost:8000/ws/voice");
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        wsChat.onmessage = function(event) {
            const response = JSON.parse(event.data);
            addMessageToChat(response.user_input_text, 'user_input_text');
            addMessageToChat(response.agent_response_text, 'agent_response_text');
        };

        wsVoice.onmessage = function(event) {
            const response = JSON.parse(event.data);
            
            // Добавляем текст пользователя
            addMessageToChat(response.user_input_text, 'user_input_text');
            
            // Добавляем ответ агента
            addMessageToChat(response.agent_response_text, 'agent_response_text');
            
            // Воспроизводим полученное аудио
            const audio = new Audio();
            audio.src = 'data:audio/mp3;base64,' + response.agent_response_audio;
            audio.play().catch(e => console.error('Ошибка воспроизведения:', e));
        };

        function addMessageToChat(text, type) {
            const messages = document.getElementById('messages');
            const message = document.createElement('div');
            
            if (type === 'user_input_text') 
            {
                message.textContent = '👤 ' + text;
                message.className = 'message-text user-message';
            } 
            else if (type === 'agent_response_text') 
            {
                message.textContent = '🤖 ' + text;
                message.className = 'message-text agent-message';
            }
            
            messages.appendChild(message);
            messages.scrollTop = messages.scrollHeight;
        }

        function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById("messageText");
            wsChat.send(input.value);
            input.value = '';
        }

        async function toggleRecording() {
            const recordButton = document.getElementById('recordButton');
            const statusElement = document.getElementById('recordingStatus');

            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob);
                        reader.onloadend = () => {
                            const base64Audio = reader.result.split(',')[1];
                            wsVoice.send(base64Audio);
                        };
                    };

                    mediaRecorder.start();
                    isRecording = true;
                    recordButton.textContent = 'Остановить запись';
                    recordButton.classList.add('recording');
                    statusElement.textContent = 'Идет запись...';

                } catch (err) {
                    console.error('Ошибка при записи:', err);
                    statusElement.textContent = 'Ошибка доступа к микрофону';
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                recordButton.textContent = 'Начать запись';
                recordButton.classList.remove('recording');
                statusElement.textContent = 'Запись остановлена';
                mediaRecorder.stream.getTracks().forEach(track => track.stop());
            }
        }
    </script>
</body>
</html>
